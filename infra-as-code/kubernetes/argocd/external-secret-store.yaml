apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secret-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jennybeate/tf.git
    targetRevision: main
    path: infra-as-code/kubernetes/platform/secret-management
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
