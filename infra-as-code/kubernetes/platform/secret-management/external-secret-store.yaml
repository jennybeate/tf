apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: ManagedIdentity
      vaultUrl: "https://kv-sbx-platform-terraform.vault.azure.net"    # set to the Azure Key Vault URI (e.g. https://kv-sbx-platform-terraform.vault.azure.net)
