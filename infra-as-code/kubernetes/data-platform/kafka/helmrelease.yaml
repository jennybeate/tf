apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-operator
  namespace: kafka
spec:
  interval: 1h
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: ">=0.40.0 <0.41.0"
      sourceRef:
        kind: HelmRepository
        name: strimzi
  values:
    watchNamespaces:
      - kafka
