version: "3"

tasks:
  validate:
    desc: Initialize (no backend) and validate Terraform configuration
    cmds:
      - terraform init -backend=false
      - terraform validate

  fmt:
    desc: Format Terraform files recursively
    cmds:
      - terraform fmt -recursive

  lint:
    desc: Run tflint recursively
    cmds:
      - tflint --recursive

  test:
    desc: Run Terraform native tests
    cmds:
      - terraform init -backend=false
      - terraform test

  all:
    desc: Run fmt, validate, lint, and test
    cmds:
      - task: fmt
      - task: validate
      - task: lint
      - task: test
