version: "3"

tasks:
  validate:
    desc: Initialize (no backend) and validate Terraform configuration
    cmds:
      - terraform init -backend=false
      - terraform validate

  fmt:
    desc: Format Terraform files recursively
    cmds:
      - terraform fmt -recursive

  lint:
    desc: Run tflint recursively
    cmds:
      - tflint --recursive

  security:
    desc: Run tfsec security scan
    cmds:
      - tfsec .

  all:
    desc: Run fmt, validate, lint, and security
    cmds:
      - task: fmt
      - task: validate
      - task: lint
      - task: security
