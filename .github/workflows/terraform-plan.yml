name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  id-token: write       # required for OIDC auth to Azure
  pull-requests: write  # required to post plan output as a PR comment

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    environment: sandbox
    env:
      TF_WORKING_DIR: sandbox
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform format check
        run: terraform fmt -recursive -check
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=sandbox/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: tflint
        run: |
          tflint --init
          tflint --recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Install tfsec
        run: |
          curl -Lo tfsec https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/

      - name: tfsec
        run: tfsec ${{ env.TF_WORKING_DIR }}
        working-directory: ${{ github.workspace }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n...[truncated]' : plan;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = `### ${status} Terraform Plan — \`${{ env.TF_WORKING_DIR }}\`

            <details><summary>Show plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
