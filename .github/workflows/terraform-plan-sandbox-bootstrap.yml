name: Terraform plan (sandbox-bootstrap)
run-name: sandbox-plan-bootstrap

on:
  pull_request:
    paths:
      - infra-as-code/terraform/solutions/sandbox-bootstrap/**
      - gitops/sandbox/argocd/root.yaml
  workflow_run:
    workflows: ["Terraform Apply — Sandbox"]
    types: [completed]

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      environment: sbx
      solution: sandbox-bootstrap
    secrets: inherit
