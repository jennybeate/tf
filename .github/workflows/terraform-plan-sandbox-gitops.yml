name: Terraform plan (sandbox-gitops)
run-name: sandbox-plan-gitops

on:
  pull_request:
    paths:
      - infra-as-code/terraform/solutions/sandbox-gitops/**
      - infra-as-code/gitops/argocd/root.yaml
  workflow_run:
    workflows: ["Terraform Apply — Sandbox"]
    types: [completed]

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      environment: sbx
      solution: sandbox-gitops
    secrets: inherit
