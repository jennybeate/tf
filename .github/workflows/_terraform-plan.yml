name: _terraform-plan (reusable)
run-name: plan-kubernetes-infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: "Short environment code (e.g. sbx, can, liv)"
        type: string
        required: true
      solution:
        description: "Solution name matching folder under infra-as-code/terraform/solutions/ (e.g. sandbox)"
        type: string
        required: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra-as-code/terraform/solutions/${{ inputs.solution }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.14.6"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.55.0

      - name: Setup Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.43.3
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task all
        run: task all

      - name: tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: infra-as-code/terraform/solutions/${{ inputs.solution }}
          additional_args: --exclude-path .terraform
        continue-on-error: ${{ !contains(fromJSON('["prod","prod","production"]'), inputs.environment) }}

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra-as-code/terraform/solutions/${{ inputs.solution }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_FEDERATED_TOKEN_FILE: /tmp/azure-federated-token

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.14.6"

      - name: Install kubelogin
        run: az aks install-cli --kubelogin-version v0.1.3

      - name: Write OIDC token for kubelogin
        run: |
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r .value > /tmp/azure-federated-token

      - name: Cache Terraform plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform init
        timeout-minutes: 5
        run: |
          mkdir -p ${{ runner.temp }}/.terraform.d/plugin-cache
          terraform init \
            -backend-config="resource_group_name=rg-${{ inputs.environment }}-platform-terraform-state" \
            -backend-config="storage_account_name=st${{ inputs.environment }}platformtfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.solution }}/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Terraform plan
        timeout-minutes: 10
        run: |
          terraform plan \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -lock-timeout=5m \
            -out=tfplan \
            -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-${{ inputs.solution }}-${{ github.run_id }}
          path: infra-as-code/terraform/solutions/${{ inputs.solution }}/tfplan
          retention-days: 7
