name: _terraform-plan (reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the Terraform deployment directory (e.g. sandbox)"
        type: string
        required: true
      var_file:
        description: "Path to the .tfvars file, relative to working_directory (e.g. environments/sbx.tfvars)"
        type: string
        required: true
      tf_state_key:
        description: "Backend state key (e.g. sandbox/terraform.tfstate)"
        type: string
        required: true
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_BACKEND_RESOURCE_GROUP:
        required: true
      TF_BACKEND_STORAGE_ACCOUNT:
        required: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065 # v3.1.2

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.0.0

      - name: Cache tflint plugins
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('.tflint.hcl') }}

      - name: Configure Terraform plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Terraform validate
        run: terraform validate

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

      - name: tfsec
        run: tfsec .

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065 # v3.1.2

      - name: Configure Terraform plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform init
        timeout-minutes: 5
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="use_azuread_auth=true"
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Terraform plan
        timeout-minutes: 10
        run: |
          terraform plan \
            -var-file=${{ inputs.var_file }} \
            -lock-timeout=5m \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt

      - name: Read plan output
        id: plan-output
        run: |
          {
            echo 'CONTENT<<PLAN_EOF'
            cat plan.txt
            echo 'PLAN_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing plan comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574febe8579e1b6 # v3.1.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- tf-plan-${{ inputs.working_directory }} -->"

      - name: Create or update plan comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd884c0a # v4.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- tf-plan-${{ inputs.working_directory }} -->
            ## Terraform Plan — `${{ inputs.working_directory }}`

            <details><summary>Show plan</summary>

            ```
            ${{ steps.plan-output.outputs.CONTENT }}
            ```

            </details>

            > Run ID: ${{ github.run_id }} | Triggered by: @${{ github.actor }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tfplan-${{ inputs.working_directory }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 7
