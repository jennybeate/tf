name: _terraform-plan (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Short environment code (e.g. sbx, can, liv)"
        type: string
        required: true
      solution:
        description: "Solution name matching folder under infra-as-code/terraform/solutions/ (e.g. sandbox)"
        type: string
        required: true


jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra-as-code/terraform/solutions/${{ inputs.solution }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.14.6"

      - name: Install tools
        run: bash "$GITHUB_WORKSPACE/scripts/install-tools.sh"

      - name: task all
        run: task all

      - name: tfsec
        run: tfsec . --exclude-path .terraform
        continue-on-error: ${{ !contains(fromJSON('["prd","prod","production"]'), inputs.environment) }}

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra-as-code/terraform/solutions/${{ inputs.solution }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.14.6"

      - name: Install tools
        run: bash "$GITHUB_WORKSPACE/scripts/install-tools.sh"

      - name: Cache Terraform plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform init
        timeout-minutes: 5
        run: |
          mkdir -p ${{ runner.temp }}/.terraform.d/plugin-cache
          terraform init \
            -backend-config="resource_group_name=rg-${{ inputs.environment }}-platform-terraform-state" \
            -backend-config="storage_account_name=st${{ inputs.environment }}platformtfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.solution }}/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Terraform plan
        timeout-minutes: 10
        run: |
          terraform plan \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -lock-timeout=5m \
            -out=tfplan \
            -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tfplan-${{ inputs.solution }}-${{ github.run_id }}
          path: infra-as-code/terraform/solutions/${{ inputs.solution }}/tfplan
          retention-days: 7
