name: Terraform apply (sandbox-bootstrap)
run-name: sandbox-apply-bootstrap

on:
  push:
    branches:
      - main
    paths:
      - infra-as-code/terraform/solutions/sandbox-bootstrap/**
      - gitops/sandbox/argocd/root.yaml
  workflow_dispatch:

jobs:
  apply:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      environment: sbx
      solution: sandbox-bootstrap
    secrets: inherit
