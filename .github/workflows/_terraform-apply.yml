name: _terraform-apply (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Short environment code matching GitHub Environment name (e.g. sbx, can, liv)"
        type: string
        required: true
      solution:
        description: "Solution name matching folder under infra-as-code/terraform/solutions/ (e.g. sandbox)"
        type: string
        required: true

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra-as-code/terraform/solutions/${{ inputs.solution }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.14.6"

      - name: Install tools
        run: bash "$GITHUB_WORKSPACE/.devcontainer/scripts/install-tools.sh"

      - name: Configure Terraform plugin cache dir
        run: mkdir -p ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform init
        timeout-minutes: 5
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-${{ inputs.environment }}-platform-terraform-state" \
            -backend-config="storage_account_name=st${{ inputs.environment }}platformtfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.solution }}/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Terraform apply
        timeout-minutes: 20
        run: |
          terraform apply \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -lock-timeout=10m \
            -auto-approve \
            -no-color
