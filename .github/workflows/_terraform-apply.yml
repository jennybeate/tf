name: _terraform-apply (reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the Terraform deployment directory (e.g. modules/key-vault/v1.0.0)"
        type: string
        required: true
      var_file:
        description: "Path to the .tfvars file, relative to working_directory (e.g. environments/sbx.tfvars)"
        type: string
        required: true
      tf_state_key:
        description: "Backend state key (e.g. modules/key-vault/terraform.tfstate)"
        type: string
        required: true
      environment:
        description: "GitHub environment name that gates the apply step (e.g. sandbox)"
        type: string
        required: true

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Configure Terraform plugin cache dir
        run: mkdir -p ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: ${{ runner.os }}-terraform-

      - name: Terraform init
        timeout-minutes: 5
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="use_azuread_auth=true"
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/.terraform.d/plugin-cache

      - name: Terraform apply
        timeout-minutes: 20
        run: |
          terraform apply \
            -var-file=${{ inputs.var_file }} \
            -lock-timeout=10m \
            -auto-approve \
            -no-color
