name: Terraform Plan — Sandbox
run-name: sandbox-plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra-as-code/terraform/solutions/sandbox/**"
      - "infra-as-code/terraform/modules/kubernetes/v2.0.0/**"
      - ".github/workflows/terraform-plan-sandbox.yml"
      - ".devcontainer/scripts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      environment: sbx
      solution: sandbox
    secrets: inherit
