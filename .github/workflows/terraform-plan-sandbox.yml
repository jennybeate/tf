name: Terraform Plan — sandbox

on:
  pull_request:
    branches: [main]
    paths:
      - "infra-as-code/terraform/solutions/sandbox/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      environment: sbx
      solution: sandbox
    secrets: inherit
